name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls /Applications/ | grep Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode_26* 2>/dev/null | tail -1 || ls -d /Applications/Xcode* 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: |
          mkdir -p www
          cp index.html docs.html words.txt www/
          cp -r js www/
          npx cap copy ios
          npx cap sync ios

      - name: Install CocoaPods
        run: cd ios/App && pod install

      - name: Install signing certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # Decode certificate and profile
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Import certificate
          security import certificate.p12 -k "$KEYCHAIN_NAME" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain-db

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i profile.mobileprovision))
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Installed profile with UUID: $PROFILE_UUID"

          # Clean up decoded files
          rm certificate.p12 profile.mobileprovision

      - name: Build signed IPA
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # Get the profile UUID for xcodebuild
          echo "$PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i /tmp/profile.mobileprovision))
          rm /tmp/profile.mobileprovision

          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MojAbble.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=2TR68DXJ5D \
            PROVISIONING_PROFILE="$PROFILE_UUID"

          xcodebuild -exportArchive \
            -archivePath build/MojAbble.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          # Write the API key file where xcrun expects it
          mkdir -p ~/.private_keys
          echo "$API_KEY_P8" > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/export/App.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
